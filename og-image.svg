  <!-- LT. logo -->
  <text x="72" y="118" font-family="Georgia,'Times New Roman',serif" font-size="58" font-weight="700" fill="#F5F0E8" letter-spacing="-1">LT<tspan fill="#FF5533">.</tspan></text>

  <!-- URL top right -->
  <text x="1140" y="65" font-family="Arial,Helvetica,sans-serif" font-size="17" fill="rgba(245,240,232,0.3)" text-anchor="end" letter-spacing="2.5">LAURENTHACKER.COM</text>

  <!-- Main name -->
  <text x="72" y="310" font-family="Impact,'Arial Black',sans-serif" font-size="108" fill="#F5F0E8" letter-spacing="-1">LAUREN THACKER</text>

  <!-- Subtitle -->
  <text x="74" y="368" font-family="Arial,Helvetica,sans-serif" font-size="21" fill="#FF5533" letter-spacing="7">SENIOR PM &amp; UX STRATEGIST</text>

  <!-- Divider -->
  <rect x="72" y="400" width="1058" height="1" fill="rgba(245,240,232,0.1)"/>

  <!-- Stat: $5M+ -->
  <text x="72" y="462" font-family="Impact,'Arial Black',sans-serif" font-size="58" fill="#F5F0E8">$5M+</text>
  <text x="72" y="492" font-family="Arial,sans-serif" font-size="11" fill="rgba(245,240,232,0.4)" letter-spacing="3">REVENUE INFLUENCED</text>

  <!-- Stat: 10+ -->
  <text x="310" y="462" font-family="Impact,'Arial Black',sans-serif" font-size="58" fill="#F5F0E8">10+</text>
  <text x="310" y="492" font-family="Arial,sans-serif" font-size="11" fill="rgba(245,240,232,0.4)" letter-spacing="3">YEARS SHIPPING</text>

  <!-- Stat: 40% -->
  <text x="510" y="462" font-family="Impact,'Arial Black',sans-serif" font-size="58" fill="#F5F0E8">40%</text>
  <text x="510" y="492" font-family="Arial,sans-serif" font-size="11" fill="rgba(245,240,232,0.4)" letter-spacing="3">SATISFACTION ↑</text>

  <!-- Stat: 25% -->
  <text x="730" y="462" font-family="Impact,'Arial Black',sans-serif" font-size="58" fill="#F5F0E8">25%</text>
  <text x="730" y="492" font-family="Arial,sans-serif" font-size="11" fill="rgba(245,240,232,0.4)" letter-spacing="3">DEV EFFICIENCY ↑</text>

  <!-- Available badge -->
